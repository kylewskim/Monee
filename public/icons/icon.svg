<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- White background -->
  <rect width="100" height="100" fill="white"/>

  <!-- Cute coin/wallet icon: a rounded coin with a dollar sign -->
  <!-- Outer circle (coin) -->
  <circle cx="50" cy="50" r="34" stroke="black" stroke-width="5" fill="none"/>

  <!-- Inner coin shine arc (top left) -->
  <path d="M 32 32 Q 30 50 50 66" stroke="black" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.18"/>

  <!-- Letter M -->
  <path
    d="M 32 65 L 32 38 L 50 55 L 68 38 L 68 65"
    stroke="black"
    stroke-width="5.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
